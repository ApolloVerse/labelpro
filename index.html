<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APOLLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@100..700,0..1,-50..200,20..48&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        /* Impede que o tradutor do navegador quebre as ligaduras dos ícones */
        direction: ltr;
        display: inline-block;
        font-feature-settings: 'liga';
        -webkit-font-feature-settings: 'liga';
        -moz-font-feature-settings: 'liga';
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        white-space: nowrap;
        user-select: none;
        -webkit-user-select: none;
        pointer-events: none;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root" translate="no"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
